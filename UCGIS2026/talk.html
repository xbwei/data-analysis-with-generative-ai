<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humans, AI Agents, and Teaching Stacks in GeoAI Education</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
    <style>
      :root {
        --r-main-font: Arial, Helvetica, sans-serif;
        --r-heading-font: Arial, Helvetica, sans-serif;
        --r-heading-text-transform: none;
        --r-heading-letter-spacing: 0;
        --r-main-color: #172033;
        --r-heading-color: #111827;
        --r-link-color: #2563eb;
        --r-selection-background-color: #dbeafe;
        --ink: #111827;
        --muted: #5b6475;
        --line: #d7dde8;
        --teal: #0f766e;
        --blue: #2563eb;
        --gold: #b7791f;
        --rose: #be3455;
        --panel: #f7f9fc;
      }

      .reveal {
        font-size: 27px;
      }

      .reveal .slides {
        text-align: left;
      }

      .reveal section {
        box-sizing: border-box;
        padding: 20px 42px;
      }

      .reveal section.present {
        overflow: hidden;
      }

      .reveal h1,
      .reveal h2,
      .reveal h3 {
        letter-spacing: 0;
        margin: 0 0 0.42em;
      }

      .reveal h1 {
        font-size: 1.85em;
        line-height: 1.04;
      }

      .reveal h2 {
        border-bottom: 3px solid var(--line);
        font-size: 1.38em;
        line-height: 1.12;
        margin-left: auto;
        margin-right: auto;
        max-width: 1120px;
        padding-bottom: 0.18em;
        text-align: left;
      }

      .reveal h3 {
        color: var(--ink);
        font-size: 0.8em;
      }

      .reveal p,
      .reveal li {
        line-height: 1.25;
      }

      .reveal ul,
      .reveal ol {
        margin-left: 1em;
      }

      .reveal li {
        margin: 0.22em 0;
      }

      .reveal a {
        color: var(--blue);
      }

      .eyebrow,
      .stage-label {
        color: var(--teal);
        font-size: 0.55em;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0 0 0.6em;
        text-transform: uppercase;
      }

      .title-grid {
        align-items: center;
        display: grid;
        gap: 1.1rem;
        grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.55fr);
        margin-left: auto;
        margin-right: auto;
        max-width: 1110px;
        min-height: 575px;
      }

      .deck-title {
        max-width: 820px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.72em;
        margin-top: 0.75em;
        max-width: 780px;
      }

      .contact-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 7px solid var(--teal);
        border-radius: 8px;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.1);
        padding: 1rem;
      }

      .contact-panel p {
        font-size: 0.58em;
        margin: 0.25rem 0;
      }

      .contact-panel .name {
        color: var(--ink);
        font-size: 0.78em;
        font-weight: 700;
      }

      .stage-overview {
        align-items: stretch;
        display: grid;
        gap: 0.55rem;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        margin-left: auto;
        margin-right: auto;
        margin-top: 1rem;
        max-width: 1060px;
      }

      .stage-card,
      .build-source,
      .mode-card,
      .mode-mini,
      .screenshot-slot,
      .video-card,
      .human-ai-diagram,
      .experiment-strip {
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      .build-flow {
        align-items: stretch;
        display: grid;
        gap: 0.45rem;
        grid-template-columns: 1fr 72px 1fr 72px 1fr;
        margin: 0.85rem auto 0;
        max-width: 1140px;
      }

      .build-source {
        background: #fff;
        border-top: 7px solid var(--teal);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 330px;
        padding: 0.85rem;
      }

      .build-source.agent {
        border-top-color: var(--rose);
      }

      .build-source.output {
        border-top-color: var(--gold);
      }

      .build-source p {
        color: var(--muted);
        font-size: 0.54em;
        margin: 0;
      }

      .workflow-card {
        align-content: end;
        background:
          linear-gradient(90deg, rgba(215, 221, 232, 0.75) 1px, transparent 1px),
          linear-gradient(rgba(215, 221, 232, 0.75) 1px, transparent 1px),
          #fbfcfe;
        background-size: 22px 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 0.26rem;
        min-height: 142px;
        padding: 0.45rem;
        position: relative;
      }

      .workflow-card::before {
        background: linear-gradient(90deg, transparent, rgba(15, 118, 110, 0.7), transparent);
        border-radius: 999px;
        content: "";
        height: 4px;
        left: 0.55rem;
        position: absolute;
        right: 0.55rem;
        top: 50%;
        transform: translateY(-50%);
      }

      .workflow-card::after {
        animation: flowDot 2.4s linear infinite;
        background: var(--teal);
        border-radius: 50%;
        box-shadow: 0 0 0 5px rgba(15, 118, 110, 0.14);
        content: "";
        height: 12px;
        left: 0.55rem;
        position: absolute;
        top: calc(50% - 6px);
        width: 12px;
      }

      .workflow-card span {
        border-radius: 999px;
        font-size: 0.36em;
        font-weight: 700;
        padding: 0.2rem 0.32rem;
        position: relative;
        text-align: center;
        z-index: 1;
      }

      .chip,
      .agent-node,
      .query-node,
      .clip-node,
      .example-node {
        background: #fff;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .database-node,
      .mcp-node,
      .deck-node {
        animation: softPulse 2.8s ease-in-out infinite;
        color: #fff;
      }

      .database-node {
        background: var(--teal);
      }

      .mcp-node {
        background: var(--rose);
      }

      .deck-node {
        background: var(--gold);
      }

      .build-connector {
        align-items: center;
        display: flex;
        justify-content: center;
        position: relative;
      }

      .build-connector::before {
        background: linear-gradient(90deg, var(--line), var(--teal));
        content: "";
        height: 4px;
        left: 0;
        position: absolute;
        right: 0;
      }

      .build-connector span {
        animation: connectorPulse 1.8s ease-in-out infinite;
        border-right: 4px solid var(--teal);
        border-top: 4px solid var(--teal);
        height: 18px;
        transform: rotate(45deg);
        width: 18px;
        z-index: 1;
      }

      @keyframes softPulse {
        0%,
        100% {
          box-shadow: 0 0 0 rgba(15, 118, 110, 0);
          transform: translateY(0);
        }

        50% {
          box-shadow: 0 8px 18px rgba(15, 118, 110, 0.18);
          transform: translateY(-2px);
        }
      }

      @keyframes flowDot {
        from {
          left: 0.55rem;
        }

        to {
          left: calc(100% - 1.2rem);
        }
      }

      @keyframes connectorPulse {
        0%,
        100% {
          opacity: 0.45;
          transform: rotate(45deg) translate(0, 0);
        }

        50% {
          opacity: 1;
          transform: rotate(45deg) translate(3px, -3px);
        }
      }

      .build-arrow {
        align-self: center;
        color: var(--muted);
        font-size: 1.1em;
        font-weight: 700;
      }

      .build-caption {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--teal);
        font-size: 0.58em;
        font-weight: 700;
        margin: 0.85rem auto 0;
        max-width: 1140px;
        padding: 0.45rem 0.7rem;
        text-align: center;
        width: 100%;
      }

      .stage-card {
        background: #fff;
        min-height: 198px;
        padding: 0.85rem;
        position: relative;
      }

      .stage-card.prompt {
        border-top: 7px solid var(--blue);
      }

      .stage-card.context {
        border-top: 7px solid var(--teal);
      }

      .stage-card.harness {
        border-top: 7px solid var(--rose);
      }

      .stage-card p,
      .mode-card p,
      .mode-mini p {
        color: var(--muted);
        font-size: 0.58em;
        margin: 0;
      }

      .stage-number {
        align-items: center;
        background: var(--ink);
        border-radius: 50%;
        color: #fff;
        display: flex;
        font-size: 0.52em;
        font-weight: 700;
        height: 34px;
        justify-content: center;
        margin-bottom: 0.65rem;
        width: 34px;
      }

      /* Dynamic HTML Illustrations */
      .mini-network {
        position: relative;
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .node-core {
        background: var(--teal);
        color: white;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.35em;
        font-weight: bold;
        animation: softPulse 2s infinite;
        z-index: 2;
        box-shadow: 0 4px 10px rgba(15, 118, 110, 0.3);
      }
      .node-sat {
        background: white;
        border: 2px solid var(--teal);
        color: var(--teal);
        border-radius: 50%;
        width: 34px;
        height: 34px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.3em;
        font-weight: bold;
        position: absolute;
        z-index: 2;
      }
      .node-sat.n1 { top: 5%; left: 10%; animation: float 3s ease-in-out infinite; }
      .node-sat.n2 { top: 15%; right: 5%; animation: float 3s ease-in-out infinite 1s; }
      .node-sat.n3 { bottom: 10%; left: 15%; animation: float 3s ease-in-out infinite 2s; }
      .node-sat.n4 { bottom: 5%; right: 15%; animation: float 3s ease-in-out infinite 0.5s; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      
      .mini-mcp {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        height: 100%;
        width: 100%;
      }
      .gear {
        font-size: 1.4em;
        color: var(--rose);
        animation: spin 6s linear infinite;
      }
      @keyframes spin {
        100% { transform: rotate(360deg); }
      }
      .data-packet {
        width: 12px;
        height: 12px;
        background: var(--rose);
        border-radius: 50%;
        animation: shuttle 1.5s ease-in-out infinite;
      }
      @keyframes shuttle {
        0% { transform: translateX(-25px) scale(0.5); opacity: 0; }
        50% { transform: translateX(0) scale(1.2); opacity: 1; }
        100% { transform: translateX(25px) scale(0.5); opacity: 0; }
      }
      
      .mini-match {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0.4rem;
        height: 100%;
        width: 100%;
      }
      .video-track {
        display: flex;
        gap: 0.2rem;
        padding: 0.25rem;
        background: rgba(215, 221, 232, 0.4);
        border-radius: 6px;
        width: 85%;
      }
      .video-segment {
        height: 14px;
        border-radius: 3px;
        transition: all 0.3s ease;
      }
      .video-segment.bg { background: #cbd5e1; flex-grow: 1; }
      .video-segment.hl { background: var(--gold); width: 35%; animation: highlight 2s infinite; }
      .video-segment.hl2 { background: var(--gold); width: 45%; animation: highlight 2s infinite 1s; }
      @keyframes highlight {
        0%, 100% { filter: brightness(1); transform: scale(1); box-shadow: none; }
        50% { filter: brightness(1.15); transform: scale(1.05); box-shadow: 0 0 8px rgba(183, 121, 31, 0.4); }
      }

      .stage-arrow {
        align-self: center;
        color: var(--muted);
        font-size: 1.1em;
        font-weight: 700;
      }

      .experiment-strip {
        align-items: center;
        background: var(--panel);
        display: grid;
        gap: 0.5rem;
        grid-template-columns: 1fr 0.22fr 1fr 0.22fr 1fr;
        margin: 0.8rem auto 0;
        max-width: 940px;
        padding: 0.6rem;
        width: 82%;
      }

      .mini-node {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.48em;
        font-weight: 700;
        padding: 0.35rem 0.5rem;
        text-align: center;
      }

      .mini-node.strong {
        color: var(--teal);
      }

      .mini-line {
        border-top: 2px solid var(--line);
      }

      .slide-grid {
        align-items: start;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 0.86fr) minmax(360px, 0.7fr);
        margin-left: auto;
        margin-right: auto;
        max-width: 1080px;
      }

      .harness-layout {
        align-items: center;
        display: grid;
        gap: 1.5rem;
        grid-template-columns: 1fr 1fr;
        margin-left: auto;
        margin-right: auto;
        max-width: 1210px;
      }

      .demo-slide {
        align-items: start;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 0.72fr) minmax(440px, 0.88fr);
        margin-left: auto;
        margin-right: auto;
        max-width: 1060px;
      }

      .video-row {
        display: grid;
        gap: 0.6rem;
        align-items: start;
      }

      .video-row.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .video-row.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .video-card {
        background: #fff;
        align-self: start;
        min-width: 0;
        padding: 0.45rem;
      }

      .video-card iframe {
        aspect-ratio: 16 / 9;
        border: 0;
        border-radius: 6px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
        display: block;
        max-height: 330px;
        width: 100%;
      }

      .video-card.small iframe {
        max-height: 310px;
      }

      .harness-videos.two {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .harness-videos .video-card {
        min-height: 0;
        padding-bottom: 0.32rem;
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
      }

      .harness-videos .video-card p {
        margin-top: 0.25rem;
      }

      .video-card.demo iframe {
        max-height: 390px;
      }

      .video-card p {
        font-size: 0.42em;
        margin: 0.22rem 0 0;
        text-align: center;
      }

      .prompt-diagram,
      .reasoning-diagram,
      .context-diagram,
      .geo-diagram,
      .harness-diagram,
      .human-ai-diagram {
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        position: relative;
        overflow: hidden;
        margin-top: 0.8rem;
        padding: 1rem;
        color: #334155;
      }
      .prompt-diagram::before,
      .reasoning-diagram::before,
      .context-diagram::before,
      .geo-diagram::before,
      .harness-diagram::before,
      .human-ai-diagram::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 0;
        pointer-events: none;
      }
      .prompt-diagram > *,
      .reasoning-diagram > *,
      .context-diagram > *,
      .geo-diagram > *,
      .harness-diagram > *,
      .human-ai-diagram > * {
        position: relative;
        z-index: 1;
      }

      .prompt-diagram,
      .context-diagram {
        align-items: center;
        display: grid;
        gap: 0.8rem;
        grid-template-columns: 0.8fr 1fr 0.8fr;
      }

      .person-dot,
      .model-dot,
      .retriever,
      .grounded-model,
      .answer-chip,
      .agent-core {
        align-items: center;
        border-radius: 4px;
        background: #ffffff;
        border: 2px solid;
        display: flex;
        font-family: inherit;
        font-size: 0.45em;
        font-weight: 700;
        justify-content: center;
        min-height: 50px;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .person-dot,
      .retriever {
        border-color: #3b82f6;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.1), inset 0 0 5px rgba(59, 130, 246, 0.05);
        color: #2563eb;
      }

      .model-dot,
      .grounded-model {
        border-color: #10b981;
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.1), inset 0 0 5px rgba(16, 185, 129, 0.05);
        color: #059669;
      }

      .chat-stack,
      .source-stack,
      .path-grid,
      .geo-diagram,
      .harness-diagram {
        display: grid;
        gap: 0.5rem;
      }

      .chat-stack span,
      .source-stack span,
      .path-grid span,
      .harness-diagram span,
      .map-tile {
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 4px;
        border-left: 4px solid #94a3b8;
        color: #475569;
        display: block;
        font-family: inherit;
        font-size: 0.45em;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 0.35rem 0.4rem;
        text-align: center;
      }
      .chat-stack span:last-child,
      .source-stack span:last-child {
        margin-bottom: 0;
      }

      .reasoning-diagram {
        display: grid;
        gap: 0.6rem;
        grid-template-columns: 0.7fr 1.3fr 0.7fr;
        align-items: center;
      }

      .reasoning-diagram > div:first-child {
        color: #64748b;
        font-family: inherit;
        font-size: 0.45em;
        font-weight: 600;
        text-align: center;
        background: #f8fafc;
        padding: 10px;
        border-radius: 4px;
        border: 2px dashed #cbd5e1;
      }

      .path-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .answer-chip {
        border-color: #f59e0b;
        box-shadow: 0 0 10px rgba(245, 158, 11, 0.1), inset 0 0 5px rgba(245, 158, 11, 0.05);
        color: #d97706;
      }

      .geo-diagram {
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        gap: 0;
        padding-top: 15px;
      }

      .map-tile {
        min-height: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left-color: #94a3b8;
        width: 80%;
        margin-top: -15px;
        box-shadow: 0 -4px 15px rgba(0,0,0,0.08);
        background: #ffffff !important;
        position: relative;
        z-index: 1;
      }
      .map-tile:nth-child(1) { z-index: 1; width: 95%; border-left-color: #3b82f6; } /* bottom layer */
      .map-tile:nth-child(2) { z-index: 2; width: 90%; border-left-color: #10b981; }
      .map-tile:nth-child(3) { z-index: 3; width: 85%; border-left-color: #f59e0b; }
      .map-tile:nth-child(4) { z-index: 4; width: 80%; border-left-color: #ec4899; } /* top layer */

      .map-tile .geo-example {
        color: #64748b;
        font-size: 0.7em;
        margin-top: 5px;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 400;
      }

      .harness-diagram {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .agent-core {
        grid-column: 1 / -1;
        border-color: #ec4899;
        box-shadow: 0 0 10px rgba(236, 72, 153, 0.1), inset 0 0 5px rgba(236, 72, 153, 0.05);
        color: #be185d;
      }

      .mode-stack,
      .final-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-left: auto;
        margin-right: auto;
        margin-top: 1rem;
        max-width: 1040px;
      }

      .mode-card {
        background: var(--panel);
        border-top: 7px solid var(--teal);
        display: flex;
        flex-direction: column;
        min-height: 185px;
        padding: 0.8rem;
      }

      .mode-slide {
        align-items: stretch;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: minmax(0, 0.95fr) minmax(410px, 0.8fr);
      }

      .screenshot-grid {
        display: grid;
        gap: 0.5rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin: 0.55rem auto 0;
        max-width: 1130px;
      }

      .screenshot-card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
        cursor: zoom-in;
        margin: 0;
        padding: 0.4rem;
        position: relative;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .screenshot-card img {
        background: #f8fafc;
        border-radius: 6px;
        display: block;
        height: 430px;
        object-fit: contain;
        width: 100%;
      }

      .screenshot-card.zoomed {
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.38);
        cursor: zoom-out;
        left: 50%;
        margin: 0;
        max-width: 1180px;
        max-height: 88vh;
        overflow: auto;
        padding: 0.48rem;
        position: fixed;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 88vw;
        z-index: 9999;
      }

      .screenshot-card.zoomed img {
        height: auto;
        max-height: none;
        width: 100%;
      }

      .screenshot-card figcaption {
        color: var(--muted);
        font-size: 0.43em;
        font-weight: 700;
        margin-top: 0.26rem;
        text-align: center;
      }

      .screenshot-slot {
        align-items: center;
        background:
          linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(37, 99, 235, 0.08) 1px, transparent 1px),
          #f8fafc;
        background-size: 28px 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 360px;
        padding: 0.8rem;
        text-align: center;
      }

      .screenshot-slot span {
        color: var(--teal);
        font-size: 0.74em;
        font-weight: 700;
      }

      .screenshot-slot p {
        color: var(--muted);
        font-size: 0.5em;
        margin: 0.35rem 0 0;
      }

      .human-ai-layout {
        align-items: start;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: minmax(0, 0.84fr) minmax(410px, 0.74fr);
        margin-left: auto;
        margin-right: auto;
        max-width: 1060px;
      }

      .human-ai-diagram {
        align-items: center;
        background: #f8fafc;
        display: grid;
        gap: 0;
        grid-template-columns: 1fr auto 1fr;
        min-height: 345px;
        padding: 2rem;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
      }

      .ai-side,
      .human-side {
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        min-height: 250px;
        padding: 1.5rem;
        position: relative;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        transition: transform 0.3s ease;
      }
      .ai-side:hover, .human-side:hover {
        transform: translateY(-5px);
      }

      .ai-side {
        border-top: 5px solid #3b82f6;
        margin-right: -20px;
      }

      .human-side {
        border-top: 5px solid #10b981;
        margin-left: -20px;
      }

      .ai-side h3,
      .human-side h3 {
        color: #0f172a;
        margin-top: 0;
        margin-bottom: 1rem;
        font-family: inherit;
        font-weight: 700;
        text-transform: none;
        letter-spacing: 0;
        border-bottom: 2px dashed #cbd5e1;
        padding-bottom: 0.5rem;
        text-align: center;
      }

      .ai-side p,
      .human-side p {
        color: #475569;
        font-size: 0.6em;
        margin: 0.8rem 0;
        font-family: inherit;
        font-weight: 600;
        text-transform: none;
        text-align: center;
      }

      .bridge {
        background: linear-gradient(135deg, #3b82f6, #10b981);
        color: #ffffff;
        font-size: 0.55em;
        font-family: inherit;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 8px 16px;
        border-radius: 20px;
        position: relative;
        z-index: 2;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        border: 2px solid #ffffff;
      }
      .bridge::after {
        content: ' ➔';
      }


      .mode-mini {
        background: #fff;
        border-top: 7px solid var(--teal);
        padding: 0.65rem;
        text-align: center;
      }

      .mode-mini span {
        color: var(--ink);
        display: block;
        font-size: 0.56em;
        font-weight: 700;
      }

      .final-points {
        font-size: 0.82em;
        margin-top: 0.8rem;
      }

      .final-message {
        align-items: start;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: minmax(0, 1fr) 320px;
        margin: 1rem auto 0;
        max-width: 1040px;
      }

      .final-message .final-points {
        font-size: 0.78em;
        margin-top: 0;
      }

      .final-message .final-points li {
        margin: 0.55rem 0;
      }

      .final-contact {
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 7px solid var(--teal);
        border-radius: 8px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.1);
        padding: 0.75rem;
      }

      .final-contact p {
        color: var(--muted);
        font-size: 0.5em;
        margin: 0.22rem 0;
      }

      .final-contact .name {
        color: var(--ink);
        font-size: 0.66em;
        font-weight: 700;
      }

      .closing-line {
        color: var(--teal);
        font-size: 0.86em;
        font-weight: 700;
        margin-top: 0.85rem;
        text-align: center;
      }

      .stage-label-text {
        color: var(--teal);
        font-size: 0.68em;
        font-weight: 700;
        margin: 0 0 0.15em;
      }

      .harness-question {
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 5px solid var(--teal);
        border-radius: 8px;
        margin-top: 0.55rem;
        padding: 0.45rem 0.65rem;
      }

      .harness-question .question-lead {
        color: var(--muted);
        font-size: 0.5em;
        font-weight: 400;
        margin: 0 0 0.1em;
      }

      .harness-question .question-text {
        color: var(--ink);
        font-size: 0.72em;
        font-weight: 700;
        margin: 0 0 0.35em;
      }

      .harness-question .question-text.emphasis {
        color: var(--teal);
        font-size: 0.72em;
        margin: 0;
      }

      .geo-example {
        color: var(--ink);
        display: block;
        font-size: 0.88em;
        font-weight: 400;
        margin-top: 0.15rem;
      }

      .workflow-steps {
        border-top: 1px solid var(--line);
        color: var(--teal);
        font-size: 0.52em;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-top: auto;
        padding-top: 0.45rem;
      }

      .callout {
        background: rgba(255, 255, 255, 0.92);
        border: 2px solid var(--teal);
        border-radius: 5px;
        color: var(--ink);
        font-size: 0.38em;
        font-weight: 700;
        padding: 0.18rem 0.4rem;
        pointer-events: none;
        position: absolute;
        white-space: nowrap;
        z-index: 10;
      }

      .video-evidence {
        color: var(--teal);
        font-size: 0.36em;
        font-style: italic;
        margin: 0.1rem 0 0;
        text-align: center;
      }

      @media (max-width: 900px) {
        .reveal {
          font-size: 22px;
        }

        .title-grid,
        .slide-grid,
        .harness-layout,
        .mode-slide,
        .demo-slide,
        .build-flow,
        .final-message,
        .human-ai-layout,
        .stage-overview,
        .mode-stack,
        .final-grid,
        .screenshot-grid,
        .video-row.two {
          grid-template-columns: 1fr;
        }

        .stage-arrow,
        .build-arrow {
          display: none;
        }

        .experiment-strip {
          width: 100%;
        }
      }
      /* Premium Dynamic Stack UI */
      .premium-stack-card {
        flex-grow: 1;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
        border: 2px solid #e2e8f0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 200px;
        position: relative;
      }
      .premium-stack-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
          linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
      }
      
      /* Premium KG Network */
      .premium-network {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 800px;
      }
      .kg-node {
        position: absolute;
        border-radius: 4px;
        background: #ffffff;
        border: 2px solid #e2e8f0;
        color: #475569;
        font-size: 0.4em;
        font-family: inherit;
        font-weight: 600;
        text-transform: none;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
      }
      .kg-node.core {
        width: 45px;
        height: 45px;
        background: rgba(16, 185, 129, 0.05);
        border-color: #10b981;
        color: #059669;
        font-size: 0.5em;
        font-weight: 700;
        box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        animation: kgPulseTech 3s infinite alternate;
      }
      @keyframes kgPulseTech { 
        0% { box-shadow: 0 0 5px rgba(16,185,129,0.1); } 
        100% { box-shadow: 0 0 20px rgba(16,185,129,0.3); } 
      }
      .kg-node.sat {
        width: 40px;
        height: 40px;
        border-left: 3px solid #3b82f6;
      }
      .kg-node.sat.n1 { top: 10%; left: 10%; animation: pFloat 4s infinite; }
      .kg-node.sat.n2 { top: 15%; right: 10%; animation: pFloat 3.5s infinite 1s; }
      .kg-node.sat.n3 { bottom: 10%; left: 15%; animation: pFloat 4.2s infinite 2s; }
      .kg-node.sat.n4 { bottom: 15%; right: 15%; animation: pFloat 3.8s infinite 0.5s; }
      
      .kg-lines {
        position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events: none;
      }
      .kg-lines line {
        stroke: rgba(16,185,129,0.3);
        stroke-width: 2;
        stroke-dasharray: 4;
        animation: kgDash 20s linear infinite;
      }
      .kg-lines .sec-line { stroke: rgba(59,130,246,0.2); }
      @keyframes pFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes kgDash { to { stroke-dashoffset: -100; } }

      /* Premium MCP */
      .premium-mcp {
        display: flex; justify-content: space-between; align-items: center;
        width: 90%; margin: 0 auto; height: 100%;
      }
      .mcp-agent, .mcp-server, .mcp-tool {
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 4px;
        font-family: inherit;
        font-size: 0.45em;
        font-weight: 700;
        padding: 8px 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #334155;
      }
      .mcp-agent { border-left: 4px solid #ec4899; }
      .mcp-server { border-left: 4px solid #8b5cf6; }
      .mcp-tools { display: flex; flex-direction: column; gap: 8px; }
      .mcp-tool { border-left: 4px solid #3b82f6; font-size: 0.35em; padding: 6px 10px; }
      
      .mcp-flow {
        position: relative; display: flex; align-items: center; flex-grow: 1; justify-content: center; padding: 0 10px;
      }
      .mcp-flow::before {
        content: ''; position: absolute; width: 100%; height: 2px; background: transparent; border-top: 2px dashed #cbd5e1; z-index: 0;
      }
      .mcp-packet {
        position: absolute; width: 20px; height: 3px; background: #0ea5e9; box-shadow: 0 0 10px rgba(14,165,233,0.5); z-index: 1; animation: mcpShuttle 2s ease-in-out infinite;
      }
      @keyframes mcpShuttle { 0% { left: 10%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { left: 90%; opacity: 0; } }

      /* Premium Match */
      .premium-match {
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 100%;
      }
      .yt-mock {
        width: 85%; height: 65px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 4px; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px; position: relative; overflow: hidden;
      }
      .yt-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ef4444; font-size: 1.2em; text-shadow: 0 0 10px rgba(239,68,68,0.2); animation: ytPulse 2s infinite; }
      .yt-bar { width: 100%; height: 3px; background: #e2e8f0; position: relative; }
      .yt-progress { width: 60%; height: 100%; background: #ef4444; }
      .yt-hl { position: absolute; top: -2px; height: 7px; width: 15px; background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.5); animation: ytGlow 1.5s infinite alternate; }
      .yt-hl.hl1 { left: 20%; } .yt-hl.hl2 { left: 50%; background: #0ea5e9; box-shadow: 0 0 8px rgba(14,165,233,0.5); animation-delay: 0.7s; }
      .match-arrows { display: flex; gap: 30px; }
      .m-arrow { color: #94a3b8; font-size: 0.6em; animation: mBounce 1.5s infinite; }
      .m-arrow:nth-child(2) { animation-delay: 0.75s; }
      
      .slide-mock {
        width: 70%; height: 40px; background: #ffffff; border: 2px solid #e2e8f0; border-radius: 4px; padding: 4px; display: flex; flex-direction: column; gap: 4px;
      }
      .s-title { width: 60%; height: 4px; background: #3b82f6; }
      .s-body { width: 90%; height: 3px; background: #cbd5e1; }
      
      @keyframes ytPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
      @keyframes ytGlow { from { filter: brightness(0.9); } to { filter: brightness(1.1); } }
      @keyframes mBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(3px); color: #475569; } }
      .premium-container {
        display: flex;
        flex-direction: column;
        min-height: 260px;
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      }
      .premium-caption {
        margin-top: 15px;
        font-weight: 700;
        color: #e2e8f0;
        text-align: center;
        font-size: 0.5em;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown="talk.md"
          data-separator="^\n---\n$"
          data-separator-vertical="^\n--\n$"
          data-separator-notes="^Note:"
          data-charset="utf-8">
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        slideNumber: true,
        controls: true,
        progress: true,
        center: true,
        width: 1280,
        height: 720,
        margin: 0.055,
        plugins: [RevealMarkdown, RevealNotes]
      });

      document.addEventListener('click', (event) => {
        const card = event.target.closest('.screenshot-card.zoomable');
        if (!card) {
          document.querySelectorAll('.screenshot-card.zoomed').forEach((item) => item.classList.remove('zoomed'));
          return;
        }

        document.querySelectorAll('.screenshot-card.zoomed').forEach((item) => {
          if (item !== card) item.classList.remove('zoomed');
        });
        card.classList.toggle('zoomed');
      });
    </script>
  </body>
</html>
