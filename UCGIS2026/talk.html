<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humans, AI Agents, and Teaching Stacks in GeoAI Education</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
    <style>
      :root {
        --r-main-font: Arial, Helvetica, sans-serif;
        --r-heading-font: Arial, Helvetica, sans-serif;
        --r-heading-text-transform: none;
        --r-heading-letter-spacing: 0;
        --r-main-color: #172033;
        --r-heading-color: #111827;
        --r-link-color: #2563eb;
        --r-selection-background-color: #dbeafe;
        --ink: #111827;
        --muted: #5b6475;
        --line: #d7dde8;
        --teal: #0f766e;
        --blue: #2563eb;
        --gold: #b7791f;
        --rose: #be3455;
        --panel: #f7f9fc;
      }

      .reveal {
        font-size: 28px;
      }

      .reveal .slides {
        text-align: left;
      }

      .reveal section {
        box-sizing: border-box;
        padding: 18px 26px;
      }

      .reveal section.present {
        overflow: hidden;
      }

      .reveal h1,
      .reveal h2,
      .reveal h3 {
        letter-spacing: 0;
        margin: 0 0 0.42em;
      }

      .reveal h1 {
        font-size: 1.85em;
        line-height: 1.04;
      }

      .reveal h2 {
        border-bottom: 3px solid var(--line);
        font-size: 1.38em;
        line-height: 1.12;
        padding-bottom: 0.18em;
        text-align: left;
      }

      .reveal h3 {
        color: var(--ink);
        font-size: 0.8em;
      }

      .reveal p,
      .reveal li {
        line-height: 1.25;
      }

      .reveal ul,
      .reveal ol {
        margin-left: 1em;
      }

      .reveal li {
        margin: 0.22em 0;
      }

      .reveal a {
        color: var(--blue);
      }

      .eyebrow,
      .stage-label {
        color: var(--teal);
        font-size: 0.55em;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0 0 0.6em;
        text-transform: uppercase;
      }

      .title-grid {
        align-items: center;
        display: grid;
        gap: 1.1rem;
        grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.55fr);
        min-height: 575px;
      }

      .deck-title {
        max-width: 820px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.72em;
        margin-top: 0.75em;
        max-width: 780px;
      }

      .contact-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 7px solid var(--teal);
        border-radius: 8px;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.1);
        padding: 1rem;
      }

      .contact-panel p {
        font-size: 0.58em;
        margin: 0.25rem 0;
      }

      .contact-panel .name {
        color: var(--ink);
        font-size: 0.78em;
        font-weight: 700;
      }

      .stage-overview {
        align-items: stretch;
        display: grid;
        gap: 0.55rem;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        margin-top: 1rem;
      }

      .stage-card,
      .mode-card,
      .mode-mini,
      .screenshot-slot,
      .video-card,
      .human-ai-diagram,
      .experiment-strip {
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      .stage-card {
        background: #fff;
        min-height: 215px;
        padding: 0.85rem;
        position: relative;
      }

      .stage-card.prompt {
        border-top: 7px solid var(--blue);
      }

      .stage-card.context {
        border-top: 7px solid var(--teal);
      }

      .stage-card.harness {
        border-top: 7px solid var(--rose);
      }

      .stage-card p,
      .mode-card p,
      .mode-mini p {
        color: var(--muted);
        font-size: 0.58em;
        margin: 0;
      }

      .stage-number {
        align-items: center;
        background: var(--ink);
        border-radius: 50%;
        color: #fff;
        display: flex;
        font-size: 0.52em;
        font-weight: 700;
        height: 34px;
        justify-content: center;
        margin-bottom: 0.65rem;
        width: 34px;
      }

      .stage-arrow {
        align-self: center;
        color: var(--muted);
        font-size: 1.1em;
        font-weight: 700;
      }

      .experiment-strip {
        align-items: center;
        background: var(--panel);
        display: grid;
        gap: 0.5rem;
        grid-template-columns: 1fr 0.22fr 1fr 0.22fr 1fr;
        margin: 0.8rem auto 0;
        padding: 0.6rem;
        width: 86%;
      }

      .mini-node {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.48em;
        font-weight: 700;
        padding: 0.35rem 0.5rem;
        text-align: center;
      }

      .mini-node.strong {
        color: var(--teal);
      }

      .mini-line {
        border-top: 2px solid var(--line);
      }

      .slide-grid {
        align-items: start;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 0.92fr) minmax(390px, 0.78fr);
      }

      .harness-layout {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: minmax(0, 0.72fr) minmax(520px, 1fr);
      }

      .video-row {
        display: grid;
        gap: 0.6rem;
      }

      .video-row.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .video-card {
        background: #fff;
        min-width: 0;
        padding: 0.45rem;
      }

      .video-card iframe {
        aspect-ratio: 16 / 9;
        border: 0;
        border-radius: 6px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
        display: block;
        max-height: 315px;
        width: 100%;
      }

      .video-card.small iframe {
        max-height: 235px;
      }

      .video-card p {
        font-size: 0.42em;
        margin: 0.22rem 0 0;
        text-align: center;
      }

      .prompt-diagram,
      .reasoning-diagram,
      .context-diagram,
      .geo-diagram,
      .harness-diagram {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 0.75rem;
        padding: 0.6rem;
      }

      .prompt-diagram,
      .context-diagram {
        align-items: center;
        display: grid;
        gap: 0.5rem;
        grid-template-columns: 0.8fr 1fr 0.8fr;
      }

      .person-dot,
      .model-dot,
      .retriever,
      .grounded-model,
      .answer-chip {
        align-items: center;
        border-radius: 999px;
        color: #fff;
        display: flex;
        font-size: 0.45em;
        font-weight: 700;
        justify-content: center;
        min-height: 58px;
        text-align: center;
      }

      .person-dot,
      .retriever {
        background: var(--blue);
      }

      .model-dot,
      .grounded-model {
        background: var(--teal);
      }

      .chat-stack,
      .source-stack,
      .path-grid,
      .geo-diagram,
      .harness-diagram {
        display: grid;
        gap: 0.35rem;
      }

      .chat-stack span,
      .source-stack span,
      .path-grid span,
      .map-tile,
      .harness-diagram span {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        font-size: 0.43em;
        font-weight: 700;
        padding: 0.25rem;
        text-align: center;
      }

      .reasoning-diagram {
        display: grid;
        gap: 0.45rem;
        grid-template-columns: 0.7fr 1.3fr 0.7fr;
      }

      .reasoning-diagram > div:first-child {
        align-self: center;
        color: var(--muted);
        font-size: 0.45em;
        font-weight: 700;
        text-align: center;
      }

      .path-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .answer-chip {
        background: var(--gold);
      }

      .geo-diagram {
        grid-template-columns: repeat(4, 1fr);
      }

      .map-tile {
        min-height: 58px;
      }

      .harness-diagram {
        grid-template-columns: repeat(2, 1fr);
      }

      .agent-core {
        align-items: center;
        background: var(--rose);
        border-radius: 8px;
        color: #fff;
        display: flex;
        font-size: 0.5em;
        font-weight: 700;
        grid-column: 1 / -1;
        justify-content: center;
        min-height: 58px;
      }

      .mode-stack,
      .final-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 1rem;
      }

      .mode-card {
        background: var(--panel);
        border-top: 7px solid var(--teal);
        min-height: 205px;
        padding: 0.8rem;
      }

      .mode-slide {
        align-items: stretch;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: minmax(0, 0.95fr) minmax(410px, 0.8fr);
      }

      .screenshot-slot {
        align-items: center;
        background:
          linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(37, 99, 235, 0.08) 1px, transparent 1px),
          #f8fafc;
        background-size: 28px 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 360px;
        padding: 0.8rem;
        text-align: center;
      }

      .screenshot-slot span {
        color: var(--teal);
        font-size: 0.74em;
        font-weight: 700;
      }

      .screenshot-slot p {
        color: var(--muted);
        font-size: 0.5em;
        margin: 0.35rem 0 0;
      }

      .human-ai-layout {
        align-items: start;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: minmax(0, 0.9fr) minmax(450px, 0.8fr);
      }

      .human-ai-diagram {
        align-items: center;
        background: var(--panel);
        display: grid;
        gap: 0.4rem;
        grid-template-columns: 1fr 0.5fr 1fr;
        min-height: 345px;
        padding: 0.7rem;
      }

      .ai-side,
      .human-side {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 250px;
        padding: 0.65rem;
      }

      .ai-side {
        border-top: 7px solid var(--blue);
      }

      .human-side {
        border-top: 7px solid var(--teal);
      }

      .ai-side p,
      .human-side p {
        color: var(--muted);
        font-size: 0.5em;
        margin: 0.3rem 0;
      }

      .bridge {
        color: var(--rose);
        font-size: 0.45em;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      .mode-mini {
        background: #fff;
        border-top: 7px solid var(--teal);
        padding: 0.65rem;
        text-align: center;
      }

      .mode-mini span {
        color: var(--ink);
        display: block;
        font-size: 0.56em;
        font-weight: 700;
      }

      .final-points {
        font-size: 0.82em;
        margin-top: 0.8rem;
      }

      .closing-line {
        color: var(--teal);
        font-size: 0.86em;
        font-weight: 700;
        margin-top: 0.85rem;
        text-align: center;
      }

      @media (max-width: 900px) {
        .reveal {
          font-size: 22px;
        }

        .title-grid,
        .slide-grid,
        .harness-layout,
        .mode-slide,
        .human-ai-layout,
        .stage-overview,
        .mode-stack,
        .final-grid,
        .video-row.two {
          grid-template-columns: 1fr;
        }

        .stage-arrow {
          display: none;
        }

        .experiment-strip {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown="talk.md"
          data-separator="^\n---\n$"
          data-separator-vertical="^\n--\n$"
          data-separator-notes="^Note:"
          data-charset="utf-8">
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        slideNumber: true,
        controls: true,
        progress: true,
        center: true,
        width: 1280,
        height: 720,
        margin: 0.055,
        plugins: [RevealMarkdown, RevealNotes]
      });
    </script>
  </body>
</html>
